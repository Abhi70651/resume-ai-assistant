services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    network_mode: host  # <--- This is the magic line
    env_file: .env
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    network_mode: host  # <--- This is the magic line
    environment:
      - BACKEND_URL=http://127.0.0.1:8000 # Use 127.0.0.1 since we're on the host network
    depends_on:
      - backend